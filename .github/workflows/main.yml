name: Compilar APK de Android

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Copiar repositorio
      uses: actions/checkout@v4

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5 libncursesw5 libtinfo5 cmake libffi-dev libssl-dev

    - name: Instalar Buildozer y Cython
      run: |
        pip3 install --upgrade pip
        pip3 install --user --upgrade Cython==0.29.33 virtualenv buildozer

    - name: Compilar APK con Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer -v android debug

    - name: Subir el APK generado
      uses: actions/upload-artifact@v4
      with:
        name: paquete-apk
        path: bin/*.apk
